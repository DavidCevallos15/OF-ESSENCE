<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo | OF ESSENCE</title>
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="favicon/logooffessense.jpeg">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-table-img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; }
        .table-dark-custom { background-color: var(--color-primary); color: var(--color-white); }
        .table-dark-custom th { color: var(--color-accent); font-family: var(--font-serif); font-weight: 500;}
    </style>
</head>
<body class="bg-neutral text-dark-mate">

    <!-- Navbar Minimal -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary-dark fixed-top header-shadow">
        <div class="container-fluid px-4">
            <span class="navbar-brand font-serif text-accent">OF ESSENCE | Admin</span>
            <div class="d-flex">
                <a href="index.html" class="btn btn-outline-light-gold btn-sm me-2">
                    <i class="bi bi-box-arrow-up-right"></i> Ver Tienda
                </a>
                <button class="btn btn-outline-danger btn-sm" onclick="logoutAdmin()">
                    <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
                </button>
            </div>
        </div>
    </nav>

    <!-- Dashboard Content -->
    <main class="container py-5 mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="font-serif text-primary-dark m-0">Inventario de Perfumes</h2>
            <button class="btn btn-gold rounded-0" onclick="openProductModal()">
                <i class="bi bi-plus-lg me-1"></i> Agregar Perfume
            </button>
        </div>

        <div class="card rounded-0 shadow-sm border-0">
            <div class="card-body p-0 table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark-custom pt-2 pb-2">
                        <tr>
                            <th class="ps-4">Imagen</th>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Stock</th>
                            <th class="text-end pe-4">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="adminProductTable">
                        <!-- Content injected via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Form (Add / Edit) -->
    <div class="modal fade" id="productFormModal" tabindex="-1" aria-labelledby="productFormModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content rounded-0">
                <div class="modal-header bg-primary-dark text-accent">
                    <h5 class="modal-title font-serif" id="productFormModalLabel">Detalles del Perfume</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body bg-neutral p-4">
                    <form id="productForm">
                        <input type="hidden" id="perfumeId">
                        
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label for="perfumeName" class="form-label font-sans small text-uppercase fw-semibold">Nombre del Perfume</label>
                                <input type="text" class="form-control rounded-0" id="perfumeName" required>
                            </div>
                            <div class="col-md-4">
                                <label for="perfumeStock" class="form-label font-sans small text-uppercase fw-semibold">Stock (Unidades)</label>
                                <input type="number" class="form-control rounded-0" id="perfumeStock" min="0" required>
                            </div>
                            <div class="col-12">
                                <label for="perfumeImage" class="form-label font-sans small text-uppercase fw-semibold">Imagen del Perfume (Agrega URL o Sube foto)</label>
                                
                                <div class="row g-2 align-items-center">
                                    <div class="col-md-6">
                                        <div class="input-group">
                                            <span class="input-group-text rounded-0 bg-neutral"><i class="bi bi-link"></i></span>
                                            <input type="url" class="form-control rounded-0" id="perfumeImage" placeholder="https://..." required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="input-group">
                                            <span class="input-group-text rounded-0 bg-neutral"><i class="bi bi-upload"></i></span>
                                            <input type="file" class="form-control rounded-0" id="perfumeImageUpload" accept="image/*">
                                        </div>
                                    </div>
                                </div>
                                <div class="mt-3 text-center d-none" id="imagePreviewContainer">
                                    <p class="small text-muted mb-1 font-sans">Vista previa de imagen subida:</p>
                                    <img id="imagePreview" src="" alt="Preview" class="admin-table-img border border-light shadow-sm" style="width: 120px; height: 120px;">
                                </div>
                            </div>
                            <div class="col-12">
                                <label for="perfumeDesc" class="form-label font-sans small text-uppercase fw-semibold">Descripción (Notas olfativas)</label>
                                <textarea class="form-control rounded-0" id="perfumeDesc" rows="3" required></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bg-neutral pt-0 border-top-0">
                    <button type="button" class="btn btn-outline-dark rounded-0" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary-dark rounded-0 border-accent text-accent" onclick="saveProduct()">
                        Guardar Cambios
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
